<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nRF Cloud – Send Message</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css" >
  <script src="static/script.js"></script>
</head>
<body>
  <div class="card">
    <h1>ESI Cloud</h1>
    <p class="subtitle">Send a message to your board &amp; see the API response</p>
    <button class="btn-device" id="initBtn" onclick="sendMessage('init')">Mesh Init</button>

    <!-- Provisioned devices -->
    <div class="provisioned-devices">
        <label>Provisioned Devices</label>
        <div class="device-list" id="provisionedList">
          <div class="no-devices">No provisioned devices yet.</div>
        </div>  
     </div>

    <!-- Unprovisioned devices -->
    <div class="devices-section">
      <div class="devices-header">
        <label>Unprovisioned Devices</label>
        <button class="btn-scan" id="scanBtn" onclick="toggleScan()">🔍 Scan</button>
      </div>
      <div class="device-list" id="deviceList">
        <div class="no-devices">No unprovisioned devices found. Click Scan to start.</div>
      </div>
      <div class="btn-row">
        <button class="btn-provision" id="provisionBtn" disabled onclick="provisionSelected()">Provision Selected</button>
      </div>
    </div>

    <div class="output-section">
      <div class="output-header">
        <label>Response</label>
        <span class="status-badge" id="statusBadge" style="display:none;"></span>
      </div>
      <div id="output">Waiting for action…</div>
    </div>

     <label for="message">Message</label>
    <textarea id="message" placeholder="Type your message here…">Hello from nRF Cloud</textarea>

    <div class="btn-row">
      <button class="btn-send" id="sendBtn" onclick="sendMessagebtn()">Send Message</button>
      <button class="btn-device" onclick="getDeviceState()">Device State</button>
      <button class="btn-device" onclick="listMessages()">📨 Messages</button>
    </div>


  </div>
</body>
</html>
